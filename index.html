      /* Custom scrollbar for logs */
      .scrollbar-hide::-webkit-scrollbar {
          display: none;

      .scrollbar-hide {

          scrollbar-width: none;
      }
      .animate-pulse-fast {
        animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }

        animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: .5; }
      }
